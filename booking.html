<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Travel Booking</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins&family=Roboto&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="stylemaha.css">
    <link rel="stylesheet" href="generalstyletheme.css">
    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
            }
        })();
    </script>
</head>
<body>
    <nav class="navbar">
            <div class="logo">GO EGYPT</div>
            <ul>
                <li><a href="index.html" >Home</a></li>
                <li><a href="museums.html">Museums</a></li>
                <li><a href="booking.html">Booking</a></li>
                <li><a href="signup.html" class="btn">Sign Up</a></li>
                <li><a href="login.html" class="btn" id="btn-color">Login</a></li>
                <button id="theme-toggle" class="theme-btn" class="btn" id="btn-color">Dark Mode</button>
            </ul>    
    </nav>
    <h1>Book Your Ticket</h1>
    <main>
        <div class="container">
        <form onsubmit="return booktrip(this)" class="book-form">
            <label>Full Name:</label> 
            <input type="text" name="name">
            <label>Email:</label>
            <input type="email" name="email">
            <label>Destination:</label>
            <select name="destination">
                <option hidden></option>
                <option>Grand Egyption Museum</option>
                <option>Egyption Museum in Tahrir</option>
                <option>National Museum of Egyption Civillzation</option>
                <option>Alexandria National Museum</option>
                <option>Luxor Museum </option>
                <option>National Police Museum</option>
            </select>
            <label>Phone Number:</label>
            <input type="tel" name="phone">
            <label>Check-In Date:</label>
            <input type="date" name="date">
            <label>Number Of Ticket:</label>
            <input type="number" name="people">
            <button type="submit">Book Now</button>
       </form>
       </div>
    </main>
    <section></section>
    <script src="booking.js"></script>
     <footer>
        <div class="social">
            <a href="aboutus.html" class="btn" id="btn-color">About Us</a>
            <div class="contact">
                <p class="phone"> Phone: 01012345678</p>
                <div class="icons">
                    <Span><i class="fa-brands fa-facebook-f"></i></Span>
                    <Span><i class="fa-brands fa-instagram"></i></Span>
                    <Span><i class="fa-brands fa-whatsapp"></i></Span>
                </div>
            </div>
        </div>
        <div class="fotter-buttom">
            <p class="by">© Designed By Meem Team 2026</p>
        </div>
    </footer>
    <script src="theme.js"></script>
</body>
</html>
