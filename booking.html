<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Travel Booking</title>

    <link rel="stylesheet" href="stylemaha.css">
</head>
<body>
 <h1>Book Your trip</h1><br><br><br>
 <main>
  <form onsubmit="return booktrip(this)">
   <label>Full Name:</label> 
    <input type="text" name="name"><br><br><br>
    <label>Email</label>
    <input type="email" name="email"><br><br><br>
    <label>Destination:</label>
     <select name="destination">
       <option>GIZA</option>
       <option>ALEXANDRIA</option>
       <option>SINA</option>
       <option>FAYOUM</option>
       <option>ASWAN</option>
       <option>LUXOR</option>
     </select><br><br><br>  
     <label>Phone Number:</label>
     <input type="tel" name="phone"><br><br><br>
     <label>Check-In Date:</label>
     <input type="date" name="date"><br><br><br>
     <label>Number Of people:</label>
     <input type="number" name="people"><br><br><br><br>
     <button type="submit">Book Now</button><br><br><br><br>
    </form>
 </main>
  <script src="booking.js"></script>
